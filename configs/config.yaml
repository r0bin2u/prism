project:
  name: "Prism"
  description: "E-commerce Review Aspect-Based Sentiment Analysis Platform"

data:
  semeval_restaurant: "data/human_labeled/semeval_restaurant/"
  semeval_laptop: "data/human_labeled/semeval_laptop/"
  amazon_review: "data/raw/amazon_review/"
  splits_dir: "data/splits/"
  split_ratio: [0.7, 0.15, 0.15]  # train/val/test

aspects:
  restaurant: ["food", "service", "ambience", "price", "anecdotes/miscellaneous"]
  laptop: ["battery", "screen", "speed", "design", "price", "software", "keyboard"]
  general: ["quality", "price", "shipping", "packaging", "customer_service",
            "durability", "appearance", "functionality"]

sentiments: ["positive", "negative", "neutral"]

llm:
  temperature: 0.7
  batch_save_interval: 100
  runs:
    - provider: "zhipu"
      model_name: "glm-4-flash"
      sleep_seconds: 1
    - provider: "siliconflow"
      model_name: "Qwen/Qwen2.5-7B-Instruct"
      sleep_seconds: 1
    - provider: "zhipu"
      model_name: "glm-4-flash"
      sleep_seconds: 1

training:
  model_name: "microsoft/deberta-v3-base"
  max_length: 256
  batch_size: 16
  learning_rate: 2e-5
  classifier_lr: 5e-5
  epochs: 10
  alpha: 0.7  # human loss weight
  warmup_ratio: 0.1
  early_stopping_patience: 3
  amp: false
  amp_dtype: "float32"
  seed: 42

soft_label:
  temperature_sharpening: true
  sharpening_T: 0.8
  min_consistency: 2  # at least 2 out of N runs agree to keep

api:
  host: "0.0.0.0"
  port: 8000
  max_batch_size: 100
  mini_batch_size: 64
  monitor_maxlen: 1000
  monitor_recent_window: 100
  monitor_drift_threshold: 0.15

mlflow:
  experiment_name: "prism-absa"
  tracking_uri: "mlruns/"
